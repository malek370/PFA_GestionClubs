name: IdentityProvider CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
    paths:
      - 'IdentityProvider/**'


concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' 
    defaults:
      run:
        working-directory: IdentityProvider

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0'

      - name: Cache NuGet Packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('IdentityProvider/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore Dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore

      - name: Upload Build Output
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: IdentityProvider/bin/

  test:
    name: Test
    needs: build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: IdentityProvider

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0'

      - name: Cache NuGet Packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('IdentityProvider/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Download Build Output
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: IdentityProvider/bin/

      - name: Restore Dependencies
        run: dotnet restore

      - name: Run Tests
        run: dotnet test --verbosity normal

  sonar-analysis:
    name: SonarCloud Analysis
    needs: test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: IdentityProvider

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0'

      - name: Cache NuGet Packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('IdentityProvider/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Install SonarCloud Scanner
        run: dotnet tool install --global dotnet-sonarscanner

      - name: Restore Dependencies
        run: dotnet restore

      - name: Run SonarCloud Analysis
        env:
          GITHUB_TOKEN: ${{ secrets.IDENTITYPROVIDER_GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_IdentityProvider_TOKEN }}
        run: |
          dotnet-sonarscanner begin /k:"malek370_PFA_GestionClubs_IdentityProvider" /o:"malek370" /d:sonar.token="${{ secrets.SONAR_IdentityProvider_TOKEN }}" /d:sonar.host.url="https://sonarcloud.io" /d:sonar.cs.opencover.reportsPaths="**/coverage.opencover.xml" /d:sonar.coverage.exclusions="**/Migrations/**,**/Program.cs,**/Startup.cs,**/DbContext/**"
          dotnet build --no-restore
          dotnet test --no-build --verbosity normal --collect:"XPlat Code Coverage" -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=opencover
          dotnet-sonarscanner end /d:sonar.token="${{ secrets.SONAR_IdentityProvider_TOKEN }}"

      - name: Check SonarCloud Quality Gate
        uses: sonarsource/sonarqube-quality-gate-action@v1.1.0
        timeout-minutes: 5
        with:
          scanMetadataReportFile: IdentityProvider/.scannerwork/report-task.txt
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_IdentityProvider_TOKEN }}

  docker-push:
    name: Dockerize and Push
    needs: sonar-analysis
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./IdentityProvider
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/identityprovider:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/identityprovider:${{ github.sha }}