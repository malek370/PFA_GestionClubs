name: ApiGateway CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
    paths:
      - 'ApiGateway/**'


concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ApiGateway

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0'

      - name: Cache NuGet Packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/ApiGateway/**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore Dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore

      - name: Upload Build Output
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: ApiGateway/bin/

  docker-push:
    name: Dockerize and Push
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./ApiGateway
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/apigateway:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/apigateway:${{ github.sha }}
