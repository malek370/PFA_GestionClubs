name: Chatbot CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
    paths:
      - 'Chatbot/**'


concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Chatbot

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('Chatbot/requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-

      - name: Install Dependencies
        run: pip install -r requirements.txt pytest pytest-asyncio httpx

      - name: Run Tests
        run: pytest tests -v

  docker-push:
    name: Dockerize and Push
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./Chatbot
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/chatbot:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/chatbot:${{ github.sha }}
