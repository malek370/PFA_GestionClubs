name: GestionClubs CI/CD Pipeline

on:
  push:
    branches: ["main"]
    paths:
      - 'GestionClubs/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: GestionClubs

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Cache NuGet Packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('GestionClubs/**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore Dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore

  test:
    name: Test
    needs: build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: GestionClubs

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Cache NuGet Packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('GestionClubs/**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore Dependencies
        run: dotnet restore

      - name: Run Tests
        run: dotnet test -c Release --no-restore --verbosity normal

  sonar-analysis:
    name: Coverage & SonarCloud Quality Gate
    needs: test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: GestionClubs

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache NuGet Packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('GestionClubs/**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Cache SonarCloud Scanner
        id: cache-sonar-scanner
        uses: actions/cache@v4
        with:
          path: ~/.dotnet/tools
          key: sonar-scanner-${{ runner.os }}

      - name: Install SonarCloud Scanner
        if: steps.cache-sonar-scanner.outputs.cache-hit != 'true'
        run: dotnet tool install --global dotnet-sonarscanner

      - name: Restore Dependencies
        run: dotnet restore

      - name: Begin SonarCloud Analysis
        env:
          GITHUB_TOKEN: ${{ secrets.IDENTITYPROVIDER_GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_IdentityProvider_TOKEN }}
        run: |
          dotnet-sonarscanner begin \
            /k:"malek370_PFA_GestionClubs_Metier" \
            /o:"malek370" \
            /d:sonar.token="${{ secrets.SONAR_IdentityProvider_TOKEN }}" \
            /d:sonar.host.url="https://sonarcloud.io" \
            /d:sonar.qualitygate.wait=true \
            /d:sonar.cs.opencover.reportsPaths="**/coverage/**/coverage.opencover.xml" \
            /d:sonar.coverage.exclusions="**/*Test*.cs,**/*Tests*.cs,**/Migrations/**,**/Program.cs,**/Infrastructure/**"

      - name: Build for Analysis
        run: dotnet build --no-restore

      - name: Run Tests with Coverage (OpenCover)
        run: dotnet test --no-build --results-directory ./coverage --collect:"XPlat Code Coverage;Format=opencover"

      - name: End SonarCloud Analysis (Quality Gate Check)
        env:
          GITHUB_TOKEN: ${{ secrets.IDENTITYPROVIDER_GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_IdentityProvider_TOKEN }}
        run: dotnet-sonarscanner end /d:sonar.token="${{ secrets.SONAR_IdentityProvider_TOKEN }}"

  docker-push:
    name: Dockerize and Push
    needs: sonar-analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./GestionClubs
          file: ./GestionClubs/GestionClubs/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/gestionclubs:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/gestionclubs:${{ github.sha }}
